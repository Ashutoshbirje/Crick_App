<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
</head>

<body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f8;">
<tr>
<td align="center" style="padding:5px;">

  <!-- CONTAINER -->
  <table width="100%" cellpadding="0" cellspacing="0"
         style="max-width:600px;width:100%;background:#ffffff;border-radius:8px;table-layout:fixed;">
    
    <!-- HEADER -->
    <tr>
      <td style="background:#2e7d32;color:#ffffff;text-align:center;padding:12px;font-size:18px;font-weight:bold;border-radius:8px 8px 0 0;">
        Password Changed
      </td>
    </tr>

    <!-- CONTENT -->
    <tr>
      <td style="padding:30px 15px 10px 15px;font-size:14px;margin-top:20px">
        <p style="margin:0 0 10px 0;">Dear {{name}},</p>
        <p style="margin:0 0 10px 0;">
          Your password has been successfully changed. Your new password is:
        </p>
      </td>
    </tr>
    <!-- PASSWORD -->
    <tr>
      <td style="padding:5px 15px 5px 15px;font-size:14px;margin-top:20px">
        <p style="margin:0;padding:10px;background:#e8f5e9;color:#2e7d32;font-weight:bold;border-radius:4px;display:inline-block;">
          {{newPassword}}
        </p>
      </td>
    </tr>
    <!-- FOOTER -->
    <tr>
      <td style="padding:15px;font-size:14px;">
        <p style="margin:0 0 10px 0;">Please keep this information safe and do not share your password with anyone.</p>
        <p style="margin:0 0 10px 0;">Best Regards,<br/>CrickApp Team</p>
        <hr style="border:none;border-top:1px solid #ddd;margin:10px 0;"/>
        <p style="font-size:13px;margin:0;">
          Email: crickapp880@gmail.com<br/>
          Phone: 9322323582<br/>
          Location: Baner, Pune
        </p>
      </td>
    </tr>

  </table>

</td>
</tr>
</table>

</body>
</html>
